<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas & Finger Tracking</title>
    <!-- MediaPipe Vision Task Library -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror camera for easier drawing */
        }
        canvas {
            z-index: 10;
            pointer-events: none; /* Let video receive clicks if needed */
        }
        #controls {
            position: absolute;
            bottom: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Live Camera Stream -->
        <video id="webcam" autoplay playsinline></video>
        <!-- Drawing Canvas -->
        <canvas id="drawingCanvas"></canvas>
        
        <div id="controls">
            <p>Point index finger to draw. Middle finger down = stop drawing.</p>
        </div>
    </div>

    <script type="module">
        import { GestureRecognizer, FilesetResolver, DrawingUtils } from "https://jsdelivr.net";

        const video = document.getElementById("webcam");
        const drawingCanvas = document.getElementById("drawingCanvas");
        const canvasCtx = drawingCanvas.getContext("2d");

        let gestureRecognizer;
        let lastVideoTime = -1;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Initialize MediaPipe Gesture Recognizer
        async function initializeAI() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://jsdelivr.net"
            );
            
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://googleapis.com",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            startCamera();
        }

        // Start Mobile/Back Camera
        function startCamera() {
            const constraints = {
                video: { facingMode: "environment" }, // Forces back camera on phones
                width: { ideal: 1280 },
                height: { ideal: 720 }
            };

            navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    // Match canvas size to video size
                    drawingCanvas.width = video.videoWidth;
                    drawingCanvas.height = video.videoHeight;
                    // Start tracking
                    requestAnimationFrame(predictWebcam);
                });
            }).catch(err => {
                console.error("Camera error: ", err);
                alert("Please allow camera access to use Air Canvas.");
            });
        }

        // Main Tracking Loop
        function predictWebcam() {
            if (!gestureRecognizer) return;

            let nowInMs = Date.now();
            if (video.currentTime !== lastVideoTime) {
                const results = gestureRecognizer.recognizeForVideo(video, nowInMs);
                lastVideoTime = video.currentTime;
                
                processHandGestures(results);
            }

            requestAnimationFrame(predictWebcam);
        }

        // Process Hand Landmarks & Gestures
        function processHandGestures(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Index Finger Tip is Landmark #8
                const indexTip = landmarks[8];
                // Middle Finger Tip is Landmark #12
                const middleTip = landmarks[12];
                
                // Convert normalized coordinates (0.0 to 1.0) to Canvas pixels
                const currentX = indexTip.x * drawingCanvas.width;
                const currentY = indexTip.y * drawingCanvas.height;

                // Simple Gesture: If index finger is up, middle finger is down
                // (Custom gesture thresholds can be expanded for complex tracing)
                if (middleTip.y > indexTip.y) {
                    if (!isDrawing) {
                        isDrawing = true;
                        lastX = currentX;
                        lastY = currentY;
                    }
                    drawOnCanvas(currentX, currentY);
                } else {
                    isDrawing = false;
                }
            } else {
                isDrawing = false;
            }
        }

        // Draw Line on Canvas
        function drawOnCanvas(currentX, currentY) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(lastX, lastY);
            canvasCtx.lineTo(currentX, currentY);
            canvasCtx.strokeStyle = "#00FF00"; // Neon Green drawing color
            canvasCtx.lineWidth = 6;
            canvasCtx.lineCap = "round";
            canvasCtx.stroke();

            // Update last known position
            lastX = currentX;
            lastY = currentY;
        }

        // Run initialization
        initializeAI();
    </script>
</body>
</html>
