<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile AR Drawing Projector</title>

    <!-- Correct MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #saveBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 12px 18px;
            background: #00ff00;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="input-video" playsinline></video>
    <canvas id="output-canvas"></canvas>

    <button id="saveBtn">Save Drawing</button>

    <div id="instructions">
        Hold index finger up to draw | Keep hand flat to stop
    </div>

    <script type="module">
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let isDrawing = false;
        let lastX = null;
        let lastY = null;

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];

                const indexTip = hand[8];
                const indexKnuckle = hand[6];

                const x = indexTip.x * canvasElement.width;
                const y = indexTip.y * canvasElement.height;

                const isIndexUp = indexTip.y < indexKnuckle.y;

                if (isIndexUp) {
                    if (!isDrawing) {
                        isDrawing = true;
                        lastX = x;
                        lastY = y;
                    } else {
                        canvasCtx.beginPath();
                        canvasCtx.moveTo(lastX, lastY);
                        canvasCtx.lineTo(x, y);
                        canvasCtx.strokeStyle = '#00FF00';
                        canvasCtx.lineWidth = 5;
                        canvasCtx.lineCap = 'round';
                        canvasCtx.stroke();

                        lastX = x;
                        lastY = y;
                    }
                } else {
                    isDrawing = false;
                    lastX = null;
                    lastY = null;
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) =>
                `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                videoElement.srcObject = stream;
                await videoElement.play();

                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 1280,
                    height: 720
                });

                camera.start();

            } catch (err) {
                alert("Camera access denied. Please enable camera permissions.");
                console.error("Camera Error:", err);
            }
        }

        startCamera();

        document.getElementById("saveBtn").addEventListener("click", () => {
            const link = document.createElement("a");
            link.download = "drawing.png";
            link.href = canvasElement.toDataURL("image/png");
            link.click();
        });
    </script>

</body>
</html>
