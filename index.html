<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Virtual Painter</title>
    <!-- Load MediaPipe Hands and Camera Utils -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
            touch-action: none;
        }
        #camera-stream {
            display: none; /* Hidden, but processes the tracking */
        }
        #paint-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- Camera Feed (hidden) -->
    <video id="camera-stream" playsinline></video>
    <!-- Drawing Canvas -->
    <canvas id="paint-canvas"></canvas>

    <div id="controls">
        <span>Point index finger to draw. Pinch to stop.</span>
    </div>

    <script>
        const videoElement = document.getElementById('camera-stream');
        const canvasElement = document.getElementById('paint-canvas');
        const ctx = canvasElement.getContext('2d');

        // Set canvas to full screen
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        function drawOnCanvas(x, y) {
            if (!isDrawing) {
                isDrawing = true;
                lastX = x;
                lastY = y;
            }
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            lastX = x;
            lastY = y;
        }

        function onResults(results) {
            ctx.save();
            
            // Draw detected hands (if you want visible hand landmarks, uncomment next 3 lines)
            // ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            // if (results.multiHandLandmarks) {
            //     for (const landmarks of results.multiHandLandmarks) { ... }
            // }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Landmark 8 is the index finger tip
                const indexTip = landmarks[8];
                // Landmark 4 is the thumb tip (used as a pinch/stop gesture)
                const thumbTip = landmarks[4];

                // Calculate distance between index tip and thumb tip to simulate "lifting the pen"
                const dx = indexTip.x - thumbTip.x;
                const dy = indexTip.y - thumbTip.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Map MediaPipe coordinates to Canvas pixel coordinates
                const canvasX = (1 - indexTip.x) * canvasElement.width; // Flip horizontally
                const canvasY = indexTip.y * canvasElement.height;

                // Pinch gesture: stop drawing if fingers are too close
                if (distance < 0.08) {
                    isDrawing = false;
                } else {
                    drawOnCanvas(canvasX, canvasY);
                }
            } else {
                isDrawing = false; // Stop drawing if no hand is detected
            }

            ctx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://jsdelivr.net{file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Access the mobile camera (uses front camera by default)
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480,
            facingMode: 'user' // Change to 'environment' for rear camera
        });

        camera.start();
    </script>
</body>
</html>
