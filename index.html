<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile AR Drawing Projector</title>

    <!-- Correct MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #saveBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 12px 18px;
            background: #00ff00;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="input-video" playsinline></video>
    <canvas id="output-canvas"></canvas>

    <button id="saveBtn">Save Drawing</button>
    <button id="flipBtn">Flip Camera</button>
    
    <div id="instructions">
        Hold index finger up to draw | Keep hand flat to stop
    </div>

<script type="module">
const video = document.getElementById("input-video");
const canvas = document.getElementById("output-canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

let drawing = false;
let lastX = null;
let lastY = null;

function drawLine(x1, y1, x2, y2) {
    ctx.strokeStyle = "#00FF00";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        drawing = false;
        lastX = null;
        lastY = null;
        return;
    }

    const hand = results.multiHandLandmarks[0];
    const tip = hand[8];
    const knuckle = hand[6];

    const x = tip.x * canvas.width;
    const y = tip.y * canvas.height;

    const indexUp = tip.y < knuckle.y;

    if (indexUp) {
        if (!drawing) {
            drawing = true;
            lastX = x;
            lastY = y;
        } else {
            drawLine(lastX, lastY, x, y);
            lastX = x;
            lastY = y;
        }
    } else {
        drawing = false;
        lastX = null;
        lastY = null;
    }
}

const hands = new Hands({
    locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

hands.onResults(onResults);

let currentFacing = "environment";
let currentStream = null;

async function startCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
    }

    currentStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacing }
    });

    video.srcObject = currentStream;
    await video.play();

    requestAnimationFrame(processFrame);
}

async function processFrame() {
    await hands.send({ image: video });
    requestAnimationFrame(processFrame);
}

document.getElementById("saveBtn").onclick = () => {
    const link = document.createElement("a");
    link.download = "drawing.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
};

document.getElementById("flipBtn").onclick = async () => {
    currentFacing = currentFacing === "environment" ? "user" : "environment";
    await startCamera();
};

startCamera();
</script>

</body>
</html>
